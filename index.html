<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sidebar Menu</title>
  <!-- Font Awesome para ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
 
  <!-- Checkbox hack para abrir/fechar sidebar sem JS -->
  <input type="checkbox" id="sidebar-toggle" class="sidebar-toggle" />
 
  <!-- Botão hamburguer (visível quando sidebar está fechada) -->
  <label for="sidebar-toggle" class="hamburger-btn" aria-label="Abrir menu">
    <i class="fas fa-bars"></i>
  </label>
 
  <!-- SIDEBAR -->
  <aside class="sidebar">
 
    <!-- Cabeçalho da sidebar -->
    <div class="sidebar-header">
      <span class="sidebar-logo">CodingLab</span>
      <label for="sidebar-toggle" class="close-btn" aria-label="Fechar menu">
        <i class="fas fa-times"></i>
      </label>
    </div>
 
    <!-- Links de navegação -->
    <nav class="sidebar-nav">
      <ul>
        <li>
          <a href="#" class="nav-item active">
            <i class="fas fa-table-cells-large"></i>
            <span>Dashboard</span>
          </a>
        </li>
        <li>
          <a href="#" class="nav-item">
            <i class="fas fa-link"></i>
            <span>Shortcuts</span>
          </a>
        </li>
        <li>
          <a href="#" class="nav-item">
            <i class="fas fa-bars"></i>
            <span>Overview</span>
          </a>
        </li>
        <li>
          <a href="#" class="nav-item">
            <i class="fas fa-calendar-days"></i>
            <span>Events</span>
          </a>
        </li>
        <li>
          <a href="#" class="nav-item">
            <i class="fas fa-circle-question"></i>
            <span>About</span>
          </a>
        </li>
        <li>
          <a href="#" class="nav-item">
            <i class="fas fa-list"></i>
            <span>Services</span>
          </a>
        </li>
        <li>
          <a href="#" class="nav-item">
            <i class="fas fa-phone-flip"></i>
            <span>Contact</span>
          </a>
        </li>
        <li>
          <a href="#" class="nav-item">
            <i class="fas fa-comment-dots"></i>
            <span>Feedback</span>
          </a>
        </li>
      </ul>
    </nav>
 
    <!-- Redes sociais -->
    <div class="sidebar-socials">
      <a href="#" class="social-icon" aria-label="Facebook">
        <i class="fab fa-facebook-f"></i>
      </a>
      <a href="#" class="social-icon" aria-label="Twitter">
        <i class="fab fa-twitter"></i>
      </a>
      <a href="#" class="social-icon" aria-label="Instagram">
        <i class="fab fa-instagram"></i>
      </a>
      <a href="#" class="social-icon youtube" aria-label="YouTube">
        <i class="fab fa-youtube"></i>
      </a>
    </div>
 
  </aside>
 
  <!-- Overlay ao abrir o menu -->
  <label for="sidebar-toggle" class="overlay"></label>
 
  <!-- Conteúdo principal -->
  <main class="main-content"></main>
 
</body>
</html>
